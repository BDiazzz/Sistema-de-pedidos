<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Acceso Denegado - 403</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" />
  <link href="https://fonts.googleapis.com/css2?family=Comfortaa&display=swap" rel="stylesheet">
  <style>
    body {
      background-color: #000000;
      font-family: 'Comfortaa', cursive;
      overflow: hidden; /* Elimina la barra de desplazamiento */
      height: 100vh; /* Asegura que la página ocupe toda la altura visible */
    }

    h1 {
      font-size: 100px;
      color: #fff;
      font-weight: 100;
      margin: 0;
    }

    .lock {
      transition: 0.5s ease;
      position: absolute;
      overflow: hidden;
      opacity: 0;
    }

    .lock.generated {
      transform: scale(0.5);
      position: absolute;
      animation: 2s move linear;
      animation-fill-mode: forwards;
    }

    .lock::after {
      content: "";
      opacity: 0.3;
      display: block;
      position: absolute;
      height: 100%;
      width: 50%;
      top: 0;
      left: 0;
    }

    .bottom {
      background: #d68910;
      height: 40px;
      width: 60px;
      display: block;
      position: relative;
      margin: 0 auto;
    }

    .top {
      height: 60px;
      width: 50px;
      border-radius: 50%;
      border: 10px solid #fff;
      display: block;
      position: relative;
      top: 30px;
      margin: 0 auto;
    }

    @keyframes move {
      to {
        top: 100%;
      }
    }

    /* Ajustes para pantallas pequeñas */
    @media (max-width: 420px) {
      .container {
        transform: translate(-50%, -50%) scale(0.8);
      }

      .lock.generated {
        transform: scale(0.3);
      }
    }

    .container {
      z-index: 1;
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      text-align: center;
      padding: 10px;
      min-width: 300px;
    }
  </style>
</head>

<body>
  <div class="container">
    <h1>4 <img th:src="@{/image/403.png}" alt="403" height="150" width="150"> 3</h1>
    <p class="text-white">Acceso Denegado</p>
    <button class="btn btn-primary" onclick="window.history.back();">Volver</button>
  </div>

  <!-- Scripts necesarios -->
  <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
  <script>
    const interval = 500;

    function generateLocks() {
      const lock = document.createElement('div');
      const position = generatePosition();
      lock.innerHTML = '<div class="top"></div><div class="bottom"></div>';
      lock.style.top = position[0];
      lock.style.left = position[1];
      lock.classList = 'lock generated';
      document.body.appendChild(lock);
      setTimeout(() => {
        lock.style.opacity = '1';
      }, 100);
      setTimeout(() => {
        lock.parentElement.removeChild(lock);
      }, 2000);
    }

    function generatePosition() {
      const x = Math.round((Math.random() * 100) - 10) + '%';
      const y = Math.round(Math.random() * 50) + '%';
      return [x, y];
    }

    setInterval(generateLocks, interval);
    generateLocks();
  </script>
</body>

</html>

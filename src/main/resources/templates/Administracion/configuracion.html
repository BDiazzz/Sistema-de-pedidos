<!DOCTYPE html>
<html lang="en">
<head th:replace="~{index::head}">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Configuraciones</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css">
</head>
<body>
  <div class="container mt-5">
    <div class="row justify-content-center">
      <div class="col-md-6">
        <div class="card">
          <div class="card-header">
            <h5 class="card-title text-center">Configuraciones</h5>
          </div>
          <div class="card-body">
            <form>
              <div class="mb-3">
                <label for="logo" class="form-label">Logo:</label>
                <div class="input-group">
                  <input type="text" class="form-control" id="logoPlaceholder" disabled placeholder="Logo">
                  <input type="file" class="form-control d-none" id="logo" accept="image/*" onchange="showFileName(this)">
                  <div class="input-group-append">
                    <button class="btn btn-outline-secondary" type="button" onclick="document.getElementById('logo').click()">Elegir archivo</button>
                  </div>
                </div>
              </div>
              <div class="mb-3">
                <label for="slogan" class="form-label">Slogan:</label>
                <input type="text" class="form-control" id="slogan" placeholder="Ingrese el slogan">
              </div>
              <div class="mb-3">
                <label for="tema" class="form-label">Tema:</label>
                <select class="form-select" id="tema">
                  <th:block th:each="theme : ${themes}">
                  <option th:value="${theme.id}">[[${theme.name}]]</option>
                    </th:block>
                  </select>
              </div>
              <div class="d-grid gap-2 d-md-flex justify-content-md-center">
                <button type="submit" class="btn btn-primary">Guardar</button>
                <button type="button" class="btn btn-secondary">Cancelar</button>
              </div>
            </form>
          </div>
        </div>
      </div>
    </div>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>

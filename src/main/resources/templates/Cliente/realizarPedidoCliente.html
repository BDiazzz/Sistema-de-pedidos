<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{index::head}"></head>

<body>
    <header th:replace="~{homeCliente::menuSuperior}"></header>

    <div class="container mt-3 mb-5">
        <div th:replace="~{alertas::alertas}"></div> <!--Herencia de las  Alertas -->

        <div th:if="${listadoMenu.isEmpty()}" class="text-center py-5">
            <div class="d-inline-block p-4 rounded-3 shadow-sm bg-light">
                <h4 class="fw-bold text-danger">Menú no disponible</h4>
                <p class="text-muted mb-3">Actualmente no hay elementos en el menú. Por favor, vuelve más tarde.</p>
                
            </div>
        </div>
        
        
        <div th:each="menu : ${listadoMenu}">
            <div class="row">

                <div class="col-md-12">
                    <div class="card mb-4">
                        <div class="card-body d-flex align-items-center">

                            <!-- <img th:src="${menu.producto.enlaceImagen}" class="img-fluid" alt="platillo"> -->
                            <!-- Imagen -->
                            <div class="col-auto">
                                <img th:src="${menu.producto.enlaceImagen}" alt="Imagen del producto"
                                    class="img-fluid rounded" style="width: 100px; height: 100px; object-fit: cover;">
                            </div>
                            <!-- Nombre y descripción -->
                            <div class="col flex-grow-1 px-3">
                                <h5 class="fw-bold mb-1" th:text="${menu.producto.nombreProducto}"></h5>
                                <div class="card-text description" th:text="${menu.producto.descripcionProducto}"></div>
                                <span class="text-decoration-underline read-more">Leer más</span>
                                <span class="text-decoration-underline read-less d-none">Leer menos</span>
                            </div>

                            <!-- Fecha -->
                            <div class="col flex-grow-1 px-3">
                                <h5 class="fw-bold mb-1" th:text="${'Precio'}"></h5>
                                <p class="text-muted mb-0" th:text="${'$'+menu.producto.precioProducto}"></p>
                            </div>
                            <!-- Botones -->
                            <div class="col-auto d-flex gap-2">
                                <a class="btn btn-outline-dark ver-btn" data-bs-toggle="modal"
                                    data-bs-target="#modalWhopper" th:data-idmenu="${menu.idMenu}"
                                    th:data-idproducto="${menu.producto.idProducto}"
                                    th:data-nombreproducto="${menu.producto.nombreProducto}"
                                    th:data-descripcion="${menu.producto.descripcionProducto}"
                                    th:data-precio="${menu.producto.precioProducto}"
                                    th:data-img="${menu.producto.enlaceImagen}">
                                    <i class="bi bi-cart-plus"></i>
                                </a>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>        
    </div>

    <!-- Modal para agregar producto -->
    <div class="modal fade" id="modalWhopper" tabindex="-1" role="dialog" aria-labelledby="modalWhopperLabel"
        aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="verNombreProducto"></h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <div class="text-center">
                        <img id="verImagen" alt="Imagen del producto" class="img-fluid rounded border"
                            style="max-width: 100%; height: auto;">
                    </div>
                    <p class="mt-3" id="verDescripcionProducto"></p>
                    <span class="fw-bold">Precio <strong id="verPrecio"></strong></span>
                </div>
                <form th:action="@{/Cliente/agregarPedido}" method="post">
                    <div class="modal-footer">
                        <div class="d-flex justify-content-between align-items-center w-100">
                            <input type="hidden" id="idProducto" name="idProducto" />
                            <span class="fw-bold">Tu producto: <strong id="subtotal">$0</strong></span>
                            <div class="input-group">
                                <div class="input-group-prepend">
                                    <button class="btn btn-outline-secondary" type="button"
                                        id="decreaseQuantity">-</button>
                                </div>
                                <input type="text" class="form-control text-center" value="1" id="quantityInput"
                                    name="cantidad">
                                <div class="input-group-append">
                                    <button class="btn btn-outline-secondary" type="button"
                                        id="increaseQuantity">+</button>
                                </div>
                            </div>
                            <button class="btn btn-primary" type="submit">Agregar</button>
                        </div>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <div th:replace="~{homeCliente::menuInferior}"></div>

    <footer th:replace="~{index::footer}"></footer>
    <script type="text/javascript" th:src="@{/js/gestionPedidoCliente.js}"></script>


</body>

</html>

<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{index::head}"></head>

<body>
    <div th:replace="~{homeCliente::menuSuperiorCarrito}"></div>

    <div class="container py-4">
        <div class="card shadow-lg p-4">
            <div class="text-center mb-4">
                <!-- <h2 class="fw-bold">Mis Datos Personales</h2>
                <hr class="w-50 mx-auto"> -->
            </div>

            <div class="row gy-3">
                <div class="col-md-6">
                    <label for="nombre" class="form-label fw-bold">Nombre:</label>
                    <span class="form-control-plaintext" th:text="${cliente.nombreCliente}"></span>
                </div>
                <div class="col-md-6">
                    <label for="apellido" class="form-label fw-bold">Apellido:</label>
                    <span class="form-control-plaintext" th:text="${cliente.apellidoCliente}"></span>
                </div>
                <div class="col-md-6">
                    <label for="genero" class="form-label fw-bold">Género:</label>
                    <span class="form-control-plaintext" th:text="${cliente.generoCliente}"></span>
                </div>
                <div class="col-md-6">
                    <label for="telefono" class="form-label fw-bold">Número de Teléfono:</label>
                    <span class="form-control-plaintext" th:text="${cliente.numeroTelefono}"></span>
                </div>
                <div class="col-md-6">
                    <label for="fechaNacimiento" class="form-label fw-bold">Fecha de Nacimiento:</label>
                    <span class="form-control-plaintext" th:text="${cliente.fechaNacimientoC}"></span>
                </div>
            </div>

            <div class="text-center mt-4">
                <a th:href="@{/Cliente/datosPersonales}" class="btn btn-primary px-4 py-2">
                    <i class="bi bi-pencil-square"></i> Editar Datos
                </a>
            </div>
        </div>
    </div>

    <footer th:replace="~{index::footer}"></footer>
</body>

</html>

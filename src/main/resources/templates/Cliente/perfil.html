<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{index::head}">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${titulo}">Cupones</title>
    <!-- Agregar Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css">
</head>

<body>
    <div class="container mt-4">
        <!-- Encabezado del cliente -->
        <div class="text-center mb-4">
            <h1 class="fw-bold" th:text="${cliente.nombreCliente}">[Nombre del cliente]</h1>
            <p class="text-muted fs-5" th:text="${cliente.usuario.correoUsuario}">[Correo del cliente]</p>
        </div>

        <!-- Cartas con íconos y texto separado -->
        <div class="d-flex flex-wrap justify-content-center gy-3">
            <div class="col-6 col-sm-4 col-md-3 px-2 text-center">
                <a th:href="@{/Cliente/InformacionPersonal}" class="text-decoration-none">
                    <!-- Carta con ícono -->
                    <div class="card shadow-sm">
                        <div class="card-body p-3">
                            <i class="bi bi-person-fill" style="font-size: 3rem; color: #e66322;"></i>
                        </div>
                    </div>
                    <!-- Texto debajo de la carta -->
                    <h6 class="mt-2 text-dark">Información personal</h6>
                </a>
            </div>
            <div class="col-6 col-sm-4 col-md-3 px-2 text-center">
                <a th:href="@{/Cliente/canjearCupon}" class="text-decoration-none">
                    <!-- Carta con ícono -->
                    <div class="card shadow-sm">
                        <div class="card-body p-3">
                            <i class="bi bi-ticket-fill" style="font-size: 3rem; color: #e66322;"></i>
                        </div>
                    </div>
                    <!-- Texto debajo de la carta -->
                    <h6 class="mt-2 text-dark">Cupones</h6>
                </a>
            </div>
        </div>

        <!-- Apartado para editar perfil -->
        <div class="mt-4">
            <h2 class="fw-bold">Perfil</h2>
            <ul class="list-group list-group-flush">
                <li class="list-group-item">
                    <a th:href="@{/Cliente/datosPersonales}" class="text-decoration-none text-dark">
                        <i class="bi bi-person"></i> Editar Información personal
                    </a>
                </li>
                <li class="list-group-item">
                    <a th:href="@{/Cliente/Ubicacion/}" class="text-decoration-none text-dark">
                        <i class="bi bi-geo-alt"></i> Direcciones
                    </a>
                </li>
                <li class="list-group-item">
                    <a th:href="@{/logout}" class="text-decoration-none text-dark">
                        <i class="bi bi-box-arrow-right"></i> Cerrar Sesión
                    </a>
                </li>
            </ul>
        </div>
    </div>

    <!-- Pie de página y scripts -->
    <div th:replace="~{homeCliente::menuInferior}"></div>
    <footer th:replace="~{index::footer}"></footer>
    <script th:src="@{/js/formValidacionCupones.js}"></script>
    <script th:src="@{/js/modalEliminacion.js}"></script>
    <script th:src="@{/js/tooltips.js}"></script>
</body>

</html>

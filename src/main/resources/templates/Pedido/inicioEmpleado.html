<!DOCTYPE html>
<html lang="en">
<head th:replace="~{index::head}">
    <title>Inicio</title>
</head>

<body>
    <header th:replace="~{index::navbar}"></header>

    <!-- Dentro de este contianer van a trabajar -->
    <div class="container">
        <h1 class="mb-5 text-center">Bienvenido</h1>
        <div class="row justify-content-center">
            <!-- Opción Consultar Pedidos -->
            <div class="col-md-4 mb-4">
                <a th:href="@{/Pedidos}" class="text-decoration-none text-dark d-flex flex-column align-items-center">
                    <i class="bi bi-server" style="font-size: 9rem;"></i>
                    <span>Consultar Pedidos</span>
                </a>
            </div>
            <!-- Opción Registrar Cliente -->
            <div class="col-md-4 mb-4">
                <a th:href="@{/Cliente/nuevo}" class="text-decoration-none text-dark d-flex flex-column align-items-center">
                    <i class="bi bi-person-plus" style="font-size: 9rem;"></i>
                    <span>Registrar Cliente</span>
                </a>
            </div>
        </div>
        <div class="row justify-content-center">
            <!-- Opción Consultar listado de asignaciones -->
            <div class="col-md-4 mb-4">
                <a th:href="@{/Pedidos/listaAsignaciones}" class="text-decoration-none text-dark d-flex flex-column align-items-center">
                    <i class="bi bi-server" style="font-size: 9rem;"></i>
                    <span>Consultar Asignaciones</span>
                </a>
            </div>
        </div>

    </div>

    <footer th:replace="~{index::footer}"></footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.1/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>

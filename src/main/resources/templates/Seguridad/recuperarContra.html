<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{index::head}"></head>

<body class="bg-light d-flex justify-content-center align-items-center vh-100">

    <!-- Contenedor principal -->
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-6 col-lg-4">
                <div class="card shadow-lg">
                    <div class="card-body">
                        <h3 class="card-title text-center mb-4">Recuperar Contraseña</h3>
                        <div th:replace="~{alertas::alertas}"></div>

                        <form id="formRecuperar" class="needs-validation" method="post" th:action="@{/seguridad/recuperar}" >
                            <div class="mb-4">
                                <label for="correo" class="form-label fs-5">Correo Electrónico</label>
                                <input type="email" name="correo" class="form-control form-control-lg" id="correo" placeholder="Ingrese su correo" required>
                            </div>

                            <button type="submit" class="btn btn-primary w-100 fs-5">Enviar Instrucciones</button>
                        </form>

                        <div class="text-center mt-3">
                            <p class="fs-6">¿Recuerdas tu contraseña? <a th:href="@{/login}">Inicia sesión aquí</a></p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <footer th:replace="~{index::footer}"></footer>

    <!-- Scripts necesarios -->
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script type="text/javascript" th:src="@{/js/formValidacion.js}"></script>
    <script type="text/javascript" th:src="@{/js/login.js}"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.10.2/dist/umd/popper.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>

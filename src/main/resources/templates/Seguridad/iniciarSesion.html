<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title th:text="${titulo}"></title>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css"
    />
    <link
      href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap-icons/1.7.2/font/bootstrap-icons.css"
      rel="stylesheet"
    />
  </head>

  <body
    class="bg-light d-flex justify-content-center align-items-center vh-100"
  >
    <!-- Contenedor principal -->
    <div class="container">
      <div class="row justify-content-center">
        <div class="col-md-6 col-lg-5">
          <div class="card shadow-lg p-4">
            <div class="card-header text-center bg-primary text-white">
              <h3>Iniciar Sesión</h3>
            </div>
            <div th:replace="~{alertas::alertas}"></div>
            <div class="card-body">
              <form id="formulario" method="post" th:action="@{/login}">
                <!-- Campo Usuario -->
                <div class="mb-4">
                  <label for="username" class="form-label fs-5"
                    >Correo Electrónico</label
                  >
                  <input
                    type="email"
                    id="username"
                    name="username"
                    class="form-control form-control-lg"
                    placeholder="Ingrese su correo..."
                    required
                  />
                </div>

                <!-- Campo Contraseña -->
                <div class="mb-4">
                  <label for="password" class="form-label fs-5"
                    >Contraseña</label
                  >
                  <input
                    type="password"
                    id="password"
                    name="password"
                    class="form-control form-control-lg"
                    placeholder="Ingrese su contraseña..."
                    required
                  />
                </div>

                <!-- Botón de Iniciar Sesión -->
                <button type="submit" class="btn btn-primary w-100 fs-5">
                  Iniciar Sesión
                </button>
              </form>

              <!-- Enlaces para recuperar contraseña o registrarse -->
              <div class="mt-4 text-center">
                <a th:href="@{/recuperarContra}" class="fs-6">¿Olvidaste tu contraseña?</a> |
                <a th:href="@{/Cliente/CrearCuenta}" class="fs-6"
                  >Registrarse</a
                >
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
    <!-- Scripts necesarios -->
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.10.2/dist/umd/popper.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
